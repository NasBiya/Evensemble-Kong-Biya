<div class="container d-flex flex-column align-items-center justify-content-center py-5 min-vh-100">
  <h3 class="fw-bold text-teal text-uppercase mb-4">PARAMETRES</h3>

  <div class="card bg-teal border-0 rounded-5 shadow-lg" style="width: 450px;">
    <div class="card-body d-flex flex-column align-items-center p-4">
      
      <i class="bi bi-person-circle text-dark mb-4" style="font-size: 6rem; line-height: 1;"></i>

      <form class="w-100 px-3">
        <div class="mb-3 text-start">
          <label class="form-label small fw-bold text-dark text-uppercase ms-2">Identifiant</label>
          <input type="text" class="form-control rounded-pill bg-transparent border-white text-white shadow-none" style="border: 2px solid white;">
        </div>

        <div class="mb-3 text-start">
          <label class="form-label small fw-bold text-dark text-uppercase ms-2">Nouveau mots de passe</label>
          <input type="password" class="form-control rounded-pill bg-transparent border-white text-white shadow-none" style="border: 2px solid white;">
        </div>

        <div class="mb-4 text-start">
          <label class="form-label small fw-bold text-dark text-uppercase ms-2">Confirmer mots de passe</label>
          <input type="password" class="form-control rounded-pill bg-transparent border-white text-white shadow-none" style="border: 2px solid white;">
        </div>

        <div class="text-center mt-4">
          <button type="submit" class="btn btn-outline-light rounded-pill px-5 py-2 fw-bold text-uppercase">
            ENREGISTRER
          </button>
        </div>
      </form>

    </div>
  </div>
</div>
