<div class="container d-flex flex-column justify-content-center align-items-center min-vh-100 py-5">
  
  <div class="text-center">
    <img src="assets/logo_nom.png" alt="Logo" height="180" class="mb-2">
    <!--<h3 class="fw-bold text-dark text-uppercase m-0" style="letter-spacing: 2px;">EVENSEMBLE</h3>-->
  </div>

  <div class="card bg-teal text-white p-4 rounded-5 shadow-lg" style="max-width: 450px; width: 100%;">
    <div class="card-body text-center">
      
      <h3 class="fw-bold text-uppercase mb-4">Inscrivez-vous</h3>

      <div *ngIf="messageErreur" class="alert alert-danger py-2 small fw-bold">
        {{ messageErreur }}
      </div>

      <form (ngSubmit)="onRegister()">
        <div class="mb-3 text-start">
          <label class="form-label small fw-bold text-uppercase ms-2">Identifiant</label>
          <input type="text" [(ngModel)]="email" name="email" required class="form-control rounded-pill bg-transparent border-white text-white" style="border: 2px solid white;">
        </div>

        <div class="mb-3 text-start">
          <label class="form-label small fw-bold text-uppercase ms-2">Mots de passe</label>
          <input type="password" [(ngModel)]="password" name="password" required
            class="form-control rounded-pill bg-transparent border-white text-white" style="border: 2px solid white;">
        </div>

        <div class="mb-4 text-start">
          <label class="form-label small fw-bold text-uppercase ms-2">Confirmation</label>
          <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required
            class="form-control rounded-pill bg-transparent border-white text-white" style="border: 2px solid white;">
        </div>

        <button type="submit" class="btn btn-outline-light rounded-pill px-5 py-2 fw-bold text-uppercase w-100">
          Inscrire
        </button>
      </form>

      <div class="mt-4 small">
        <a routerLink="/login" class="text-white fw-bold">J'AI DÉJÀ UN COMPTE</a>
      </div>

    </div>
  </div>
</div>
