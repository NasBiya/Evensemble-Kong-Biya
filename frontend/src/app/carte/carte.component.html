<div class="container-fluid h-100">
  <div class="row h-100">

    <!-- ── Sidebar filtres ─────────────────────────────────────────────── -->
    <div class="col-md-2 border-end p-4 bg-white d-none d-lg-block">
      <h6 class="fw-bold mb-3">FILTRES</h6>

      <!-- Date filters -->
      <div class="mb-4">
        <p class="small fw-bold text-muted mb-2">DATE</p>

        <div class="form-check">
          <input class="form-check-input" type="checkbox"
            [(ngModel)]="filterAujourdhui"
            (change)="onDateFilterChange('aujourdhui')"
            id="filterAujourdhui">
          <label class="small" for="filterAujourdhui">Aujourd'hui</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox"
            [(ngModel)]="filterDemain"
            (change)="onDateFilterChange('demain')"
            id="filterDemain">
          <label class="small" for="filterDemain">Demain</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox"
            [(ngModel)]="filterDate"
            (change)="onDateFilterChange('date')"
            id="filterDate">
          <label class="small" for="filterDate">Choisir une date</label>
        </div>

        <!-- Date picker — shown only when "Choisir une date" is checked -->
        <div *ngIf="filterDate" class="mt-2">
          <input
            type="date"
            class="form-control form-control-sm"
            [(ngModel)]="filterCustomDate"
            (change)="applyFilters()"
          />
        </div>
      </div>

      <!-- Rating filters -->
      <div>
        <p class="small fw-bold text-muted mb-2">AVIS</p>

        <div class="form-check">
          <input class="form-check-input" type="checkbox"
            [(ngModel)]="filterTout"
            (change)="onToutChange()"
            id="filterTout">
          <label class="small" for="filterTout">Tout</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox"
            [(ngModel)]="filterRating1_3"
            (change)="onRatingFilterChange()"
            id="filterRating1_3">
          <label class="small" for="filterRating1_3">1–3 étoiles</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox"
            [(ngModel)]="filterRating3_5"
            (change)="onRatingFilterChange()"
            id="filterRating3_5">
          <label class="small" for="filterRating3_5">3–5 étoiles</label>
        </div>
      </div>
    </div>

    <!-- ── Liste événements ────────────────────────────────────────────── -->
    <div class="col-md-4 col-lg-3 p-3 overflow-auto" style="height: calc(100vh - 80px);">
      <h5 class="fw-bold mb-3">Événements</h5>

      <!-- Loading -->
      <div *ngIf="loading" class="text-center py-5 text-muted">
        <div class="spinner-border spinner-border-sm me-2" role="status"></div>
        Chargement des événements…
      </div>

      <!-- Error -->
      <div *ngIf="error && !loading" class="alert alert-danger small">{{ error }}</div>

      <!-- Empty -->
      <div *ngIf="!loading && !error && events.length === 0" class="text-muted small text-center py-5">
        Aucun événement trouvé.
      </div>

      <!-- Event cards -->
      <div
        class="card event-card mb-3 border rounded-4 shadow-sm overflow-hidden"
        *ngFor="let event of events"
        (click)="onSelectEvent(event)"
        [class.active-card]="selectedEvent === event"
      >
        <!-- Thumbnail or fallback -->
        <div class="position-relative" style="height: 100px; overflow: hidden;">
          <img
            *ngIf="event.thumbnail"
            [src]="event.thumbnail"
            [alt]="event.title"
            class="w-100 h-100"
            style="object-fit: cover;"
          />
          <div
            *ngIf="!event.thumbnail"
            class="bg-warning p-3 text-center h-100 d-flex align-items-center justify-content-center"
          >
            <h3 class="fw-bold text-danger mb-0" style="font-family: Impact, sans-serif; font-size: 1.3rem;">
              MUSIC <br> Festival
            </h3>
          </div>
        </div>

        <!-- Info -->
        <div class="card-body p-2 position-relative">
          <h6 class="card-title fw-bold mb-1 pe-4">{{ event.title }}</h6>
          <p class="card-text small text-muted mb-0">{{ event.displayDate }}</p>
          <p class="card-text small text-muted mb-1">{{ event.location }}</p>

          <div *ngIf="event.venue?.rating" class="small text-warning mb-1">
            ★ {{ event.venue!.rating }}
            <span class="text-muted">({{ event.venue!.reviews }} avis)</span>
          </div>

          <!-- Favourite star -->
          <i
            class="bi position-absolute top-0 end-0 m-2 fs-5"
            style="z-index: 10; text-shadow: 0 0 3px rgba(0,0,0,0.3);"
            [ngClass]="favoritesService.isFavori(event.title) ? 'bi-star-fill text-warning' : 'bi-star text-secondary'"
            (click)="onToggleFavori(event, $event)"
          ></i>
        </div>
      </div>
    </div>

    <!-- ── Carte Leaflet ────────────────────────────────────────────────── -->
    <div class="col-md-6 col-lg-7 p-0 position-relative">
      <div id="map" style="height: 100%; width: 100%; min-height: 600px;"></div>
    </div>

  </div>
</div>
