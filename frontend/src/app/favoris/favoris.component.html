<div class="container py-5 min-vh-100">
  
  <h2 class="text-center fw-bold text-uppercase mb-5 text-teal">Mes Favoris</h2>

  <div *ngIf="mesFavoris.length === 0" class="text-center py-5 text-muted bg-light rounded-4 border">
    <i class="bi bi-star" style="font-size: 3rem;"></i>
    <p class="mt-3">Vous n'avez pas encore d'événements favoris.</p>
    <a routerLink="/carte" class="btn btn-teal rounded-pill px-4 text-white mt-2">Explorer les événements</a>
  </div>

  <div class="row g-4" *ngIf="mesFavoris.length > 0">
    <div class="col-12 col-md-6 col-lg-4 col-xl-3" *ngFor="let fav of mesFavoris">
      
      <div class="card event-card h-100 border rounded-4 shadow-sm overflow-hidden position-relative bg-white">
        
        <div class="position-relative" style="height: 150px; overflow: hidden;">
          <img *ngIf="fav.thumbnail" [src]="fav.thumbnail" class="w-100 h-100" style="object-fit: cover;" [alt]="fav.title">
          
          <div *ngIf="!fav.thumbnail" class="bg-warning p-3 text-center h-100 d-flex align-items-center justify-content-center">
            <h3 class="fw-bold text-danger mb-0" style="font-family: Impact, sans-serif; font-size: 1.5rem;">
              MUSIC <br> Festival
            </h3>
          </div>
        </div>

        <div class="card-body p-3">
          <h6 class="card-title fw-bold mb-2 pe-4">{{ fav.title }}</h6>
          
          <p class="card-text small text-muted mb-1">
            <i class="bi bi-calendar-event me-1"></i> {{ fav.displayDate || 'Date non précisée' }}
          </p>
          
          <p class="card-text small text-muted mb-0">
            <i class="bi bi-geo-alt me-1"></i> {{ fav.location || 'Lieu non précisé' }}
          </p>
        </div>

        <button class="btn btn-light rounded-circle shadow-sm position-absolute top-0 end-0 m-2 d-flex align-items-center justify-content-center" 
                style="width: 35px; height: 35px; z-index: 10;" 
                (click)="retirer(fav)" 
                title="Retirer des favoris">
          <i class="bi bi-star-fill text-warning fs-5"></i>
        </button>
        
      </div>

    </div>
  </div>

</div>
